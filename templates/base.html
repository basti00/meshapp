<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1320" media="(prefers-color-scheme: dark)">
  <title>{% block title %}Meshapp{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/leaflet.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    // Set theme before paint to avoid flash.
    (function () {
      try {
        var t = localStorage.getItem("meshapp.theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="title">Meshapp</div>
    <div class="header-right">
      <nav class="primary-nav">
        <a href="{{ url_for('messages_default') }}" class="{% if request.path.startswith('/messages') or request.path == '/' %}active{% endif %}">Messages</a>
        <a href="{{ url_for('nodes') }}" class="{% if request.path.startswith('/nodes') %}active{% endif %}">Nodes</a>
      </nav>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="icon-light" aria-hidden="true">☾</span>
        <span class="icon-dark" aria-hidden="true">☀</span>
      </button>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Modals are created on demand by app.js and stack as layers on <body>. -->
  <!-- Leaflet is vendored (the Pi serves everything itself); map tiles still
       need internet in the browser, markers work without. -->
  <script src="{{ url_for('static', filename='vendor/leaflet/leaflet.js') }}"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script src="{{ url_for('static', filename='map.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
