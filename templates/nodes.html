{% extends "base.html" %}
{% block title %}Nodes · Meshapp{% endblock %}
{% block content %}
<div class="nodes-page">
  <div class="page-controls">
    <h1>Nodes</h1>
    <label class="sort-control">
      <span>Sort by</span>
      <select id="node-sort">
        <option value="last_seen">Last seen</option>
        <option value="hops">Hops</option>
      </select>
    </label>
  </div>
  <div class="nodes-layout">
    <div class="card nodes-list-card">
      <div class="node-list" id="node-list" aria-label="Known nodes"></div>
    </div>
    <div class="card nodes-map-card">
      <div id="nodes-map" class="nodes-map"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  (function () {
    const refreshSeconds = {{ auto_refresh_seconds or 0 }};
    let nodes = {{ nodes | tojson }};
    const listEl = document.getElementById("node-list");
    const mapEl = document.getElementById("nodes-map");
    const sortSelect = document.getElementById("node-sort");
    const { formatMessageTime, renderNodeButton, escapeHtml, showNodeModal } = window.MeshApp;
    const SORT_KEY = "meshapp.nodeSort";

    // Hovering a row highlights its marker immediately, but the map only
    // pans to an off-screen marker after the pointer has rested on the row
    // for a moment -- skimming or scrolling through the list must not jerk
    // the map around.
    const FLY_DELAY_MS = 500;

    let sortMode = "last_seen";
    try {
      const saved = localStorage.getItem(SORT_KEY);
      if (saved === "hops" || saved === "last_seen") sortMode = saved;
    } catch (e) {}
    if (sortSelect) {
      sortSelect.value = sortMode;
      sortSelect.addEventListener("change", function () {
        sortMode = sortSelect.value;
        try { localStorage.setItem(SORT_KEY, sortMode); } catch (e) {}
        renderList();
      });
    }

    function nodeSubtitle(node) {
      const parts = [];
      if (node.last_seen) parts.push(`Last seen ${formatMessageTime(node.last_seen)}`);
      if (node.last_hops !== null && node.last_hops !== undefined) {
        const label = Number(node.last_hops) === 1 ? "hop" : "hops";
        parts.push(`${node.last_hops} ${label}`);
      }
      return parts.length ? parts.join(" · ") : null;
    }

    function applySort(list) {
      const copy = list.slice();
      if (sortMode === "hops") {
        copy.sort(function (a, b) {
          const ha = a.last_hops, hb = b.last_hops;
          const aMissing = ha === null || ha === undefined;
          const bMissing = hb === null || hb === undefined;
          if (aMissing && bMissing) return (b.last_seen || 0) - (a.last_seen || 0);
          if (aMissing) return 1;
          if (bMissing) return -1;
          if (ha !== hb) return ha - hb;
          return (b.last_seen || 0) - (a.last_seen || 0);
        });
      } else {
        copy.sort(function (a, b) { return (b.last_seen || 0) - (a.last_seen || 0); });
      }
      return copy;
    }

    const PIN_SVG = '<svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">' +
      '<path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5' +
      'A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z" fill="currentColor"/></svg>';

    function buildRow(node) {
      const btn = renderNodeButton({
        node_id: node.node_id,
        short_name: node.short_name,
        long_name: node.long_name,
        avatar_bg: node.avatar_bg,
        avatar_fg: node.avatar_fg,
        last_seen: node.last_seen,
        battery_level: node.battery_level,
        subtitle: nodeSubtitle(node),
      });
      const pin = node.position
        ? `<span class="node-row__pin" title="Position known">${PIN_SVG}</span>`
        : "";
      return `<div class="node-row" data-node-id="${escapeHtml(node.node_id || "")}">${btn}${pin}</div>`;
    }

    let activeId = null;

    function setRowActive(nodeId) {
      if (activeId === nodeId) return;
      if (activeId !== null) {
        const prev = listEl.querySelector(".node-row--active");
        if (prev) prev.classList.remove("node-row--active");
      }
      activeId = nodeId;
      if (nodeId === null) return;
      const rowEl = listEl.querySelector(`.node-row[data-node-id="${CSS.escape(nodeId)}"]`);
      if (rowEl) rowEl.classList.add("node-row--active");
    }

    function renderList() {
      const sorted = applySort(nodes);
      listEl.innerHTML = sorted.length
        ? sorted.map(buildRow).join("")
        : '<p class="empty-state">No nodes yet.</p>';
      const keep = activeId;
      activeId = null;
      setRowActive(keep);
    }

    // ---------- Map ----------
    let mapView = null;
    let listHoverArmed = true; // false while a map-driven smooth scroll may
                               // slide rows under a stationary pointer
    if (window.MeshMap) {
      mapView = window.MeshMap.create(mapEl, {
        onHover: function (nodeId) {
          setRowActive(nodeId);
          if (nodeId === null) return;
          const rowEl = listEl.querySelector(`.node-row[data-node-id="${CSS.escape(nodeId)}"]`);
          if (rowEl) {
            listHoverArmed = false;
            rowEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }
        },
        onSelect: function (nodeId) { showNodeModal(nodeId); },
      });
      if (mapView) {
        mapView.setNodes(nodes);
        mapView.fitAll();
      }
    }

    // ---------- List hover -> map ----------
    let hoveredId = null;
    let flyTimer = null;

    function handleRowHover(event) {
      const rowEl = event.target.closest(".node-row");
      if (!rowEl) return;
      const nodeId = rowEl.dataset.nodeId;
      if (!nodeId || nodeId === hoveredId) return;
      hoveredId = nodeId;
      setRowActive(nodeId);
      if (!mapView) return;
      clearTimeout(flyTimer);
      if (mapView.hasNode(nodeId)) {
        mapView.setHighlight(nodeId);
        flyTimer = setTimeout(function () { mapView.ensureVisible(nodeId); }, FLY_DELAY_MS);
      } else {
        mapView.clearHighlight();
      }
    }

    // mousemove re-arms and also hover-starts: when the pointer enters a row,
    // mouseover fires before the re-arming mousemove, so relying on mouseover
    // alone would swallow the first hover after an auto-scroll.
    listEl.addEventListener("mousemove", function (event) {
      listHoverArmed = true;
      handleRowHover(event);
    });
    listEl.addEventListener("mouseover", function (event) {
      if (listHoverArmed) handleRowHover(event);
    });
    listEl.addEventListener("mouseleave", function () {
      hoveredId = null;
      clearTimeout(flyTimer);
      setRowActive(null);
      if (mapView) mapView.clearHighlight();
    });

    // Row click opens the node modal; clicks on the inner node button are
    // already handled by the delegated handler in app.js.
    listEl.addEventListener("click", function (event) {
      if (event.target.closest(".node-button")) return;
      const rowEl = event.target.closest(".node-row");
      if (rowEl && rowEl.dataset.nodeId) showNodeModal(rowEl.dataset.nodeId);
    });

    async function refresh() {
      try {
        const response = await fetch("/api/nodes", { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        nodes = payload.nodes || [];
        renderList();
        if (mapView) mapView.setNodes(nodes);
      } catch (e) {
        console.warn("Failed to refresh nodes", e);
      }
    }

    renderList();
    if (refreshSeconds > 0) setInterval(refresh, refreshSeconds * 1000);
  })();
</script>
{% endblock %}
